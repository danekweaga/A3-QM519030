<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Chukwunonso Daniel Ekweaga</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div id="navbar"></div>

    <hr>
    <div class="center">
        <h2>Contact</h2>
    <button onclick="toggleContact()">Show / Hide Contact Info</button>
    <div id="contactInfo" class="hidden">
        <h3>Connect With Me</h3>
        <p>
            <a href="https://www.linkedin.com/in/chukwunonso-daniel-ekweaga/" target="_blank" rel="noopener noreferrer">LinkedIn</a><br>
            <a href="https://github.com/danekweaga" target="_blank" rel="noopener noreferrer">GitHub</a>
        </p>
        <h3>Email</h3>
        <p>
            <a href="mailto:danielekweaga@gmail.com">danielekweaga@gmail.com</a>
        </p>
    </div>

        <h3>Send a message</h3>
        <form class="contact-form" action="#" method="post">
            <p>
                <label for="contact-name">Name</label><br>
                <input type="text" id="contact-name" name="name" required>
            </p>
            <p>
                <label for="contact-email">Email</label><br>
                <input type="email" id="contact-email" name="email" required>
            </p>
            <p>
                <label for="contact-message">Message</label><br>
                <textarea id="contact-message" name="message" rows="6" cols="40" required></textarea>
            </p>
            <p>
                <button type="submit">Send</button>
            </p>
        </form>
    </div>

    <hr>

    <div class="theme-buttons">
        <button onclick="applyTheme('dark')">Dark Mode</button>
        <button onclick="applyTheme('light')">Light Mode</button>
        <button onclick="applyTheme('blue')">Blue Mode</button>
    </div>

    <button><a href="index.html">Back to Home</a></button>
</body>
</html>
